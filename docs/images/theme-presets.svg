<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
	<title id="title">Appearance theme presets</title>
	<desc id="desc">Four visual themes for the review popup: ceramic, mint, pixel, and dark.</desc>
	<defs>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#3d4356" flood-opacity="0.18"/>
		</filter>
		<pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
			<path d="M18 0H0v18" fill="none" stroke="#ffffff" stroke-opacity=".28"/>
		</pattern>
	</defs>
	<rect width="1280" height="760" rx="36" fill="#eef0f4"/>
	<text x="78" y="92" font-size="42" font-weight="900" fill="#30364f">多套弹窗外观</text>
	<text x="78" y="128" font-size="22" fill="#697287">设置页或弹窗顶部可切换，所有主题共享同一套复习数据。</text>
	<g transform="translate(78 180)" filter="url(#shadow)">
		<rect width="530" height="220" rx="28" fill="#f6f2e8" stroke="#cfc0d8" stroke-width="3"/>
		<text x="34" y="54" font-size="28" font-weight="900" fill="#343a55">陶瓷卡片</text>
		<rect x="34" y="82" width="462" height="92" rx="22" fill="#edf7f4" stroke="#ccbde0" stroke-width="2"/>
		<circle cx="74" cy="128" r="22" fill="#fff3cf" stroke="#786846" stroke-width="3"/>
		<text x="114" y="121" font-size="22" font-weight="800" fill="#343a55">每日阅读论文</text>
		<text x="114" y="150" font-size="17" fill="#727b92">柔和、轻量、适合日常知识库</text>
	</g>
	<g transform="translate(672 180)" filter="url(#shadow)">
		<rect width="530" height="220" rx="28" fill="#effbf6" stroke="#b8dad0" stroke-width="3"/>
		<text x="34" y="54" font-size="28" font-weight="900" fill="#176b57">清爽文档绿</text>
		<rect x="34" y="82" width="462" height="92" rx="22" fill="#ffffff" stroke="#cde5dd" stroke-width="2"/>
		<circle cx="74" cy="128" r="22" fill="#d8fff2" stroke="#76dabc" stroke-width="3"/>
		<text x="114" y="121" font-size="22" font-weight="800" fill="#1e5f50">间隔重复原理</text>
		<text x="114" y="150" font-size="17" fill="#5d7c75">干净、文档感、低干扰</text>
	</g>
	<g transform="translate(78 450)" filter="url(#shadow)">
		<rect width="530" height="220" rx="12" fill="#d2d5fb" stroke="#4d568f" stroke-width="5"/>
		<rect width="530" height="220" rx="12" fill="url(#grid)"/>
		<text x="34" y="54" font-size="28" font-weight="900" fill="#171b3d">像素游戏机</text>
		<rect x="34" y="82" width="462" height="92" rx="8" fill="#eef0ff" stroke="#4d568f" stroke-width="4"/>
		<rect x="54" y="105" width="46" height="46" rx="5" fill="#ffc65e" stroke="#8f5310" stroke-width="4"/>
		<text x="120" y="121" font-size="22" font-weight="900" fill="#171b3d">今天到期</text>
		<text x="120" y="150" font-size="17" fill="#3d446d">复古、游戏化、识别度强</text>
	</g>
	<g transform="translate(672 450)" filter="url(#shadow)">
		<rect width="530" height="220" rx="28" fill="#07090f" stroke="#30364a" stroke-width="3"/>
		<text x="34" y="54" font-size="28" font-weight="900" fill="#f7f8ff">暗色精密</text>
		<rect x="34" y="82" width="462" height="92" rx="22" fill="#111318" stroke="#30364a" stroke-width="2"/>
		<circle cx="74" cy="128" r="22" fill="#171a22" stroke="#7f89ef" stroke-width="3"/>
		<text x="114" y="121" font-size="22" font-weight="800" fill="#f7f8ff">算法题复盘</text>
		<text x="114" y="150" font-size="17" fill="#9aa2b8">OLED、聚焦、夜间友好</text>
	</g>
</svg>
