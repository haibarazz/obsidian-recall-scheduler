<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
	<title id="title">Memory scheduling flow</title>
	<desc id="desc">A diagram explaining the simplified FSRS scheduling flow from adding a memory item to feedback and next review time.</desc>
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#fff7dc"/>
			<stop offset="0.48" stop-color="#edf7f4"/>
			<stop offset="1" stop-color="#e9edff"/>
		</linearGradient>
		<marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
			<path d="M0 0 12 6 0 12z" fill="#8a95ad"/>
		</marker>
		<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
			<feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#5f6478" flood-opacity="0.18"/>
		</filter>
	</defs>
	<rect width="1280" height="760" rx="36" fill="url(#bg)"/>
	<text x="90" y="96" font-size="42" font-weight="900" fill="#30364f">艾宾浩斯思想 + 简化 FSRS 动态调度</text>
	<text x="90" y="134" font-size="22" fill="#697287">插件不是固定每 10 分钟递增提醒，而是根据复习反馈重新计算下一次到期时间。</text>
	<g font-size="22" font-weight="850" text-anchor="middle" fill="#30364f" filter="url(#shadow)">
		<rect x="92" y="230" width="220" height="136" rx="26" fill="#ffffff" stroke="#cfd8e3" stroke-width="3"/>
		<text x="202" y="288">添加记忆项</text>
		<text x="202" y="322" font-size="16" font-weight="500" fill="#71798d">整篇笔记或标题块</text>
		<rect x="386" y="230" width="220" height="136" rx="26" fill="#ffffff" stroke="#cfd8e3" stroke-width="3"/>
		<text x="496" y="288">到期提醒</text>
		<text x="496" y="322" font-size="16" font-weight="500" fill="#71798d">按 dueAt 进入今日面板</text>
		<rect x="680" y="230" width="220" height="136" rx="26" fill="#ffffff" stroke="#cfd8e3" stroke-width="3"/>
		<text x="790" y="288">复习反馈</text>
		<text x="790" y="322" font-size="16" font-weight="500" fill="#71798d">忘了 / 困难 / 记得 / 简单</text>
		<rect x="974" y="230" width="220" height="136" rx="26" fill="#ffffff" stroke="#cfd8e3" stroke-width="3"/>
		<text x="1084" y="288">下次间隔</text>
		<text x="1084" y="322" font-size="16" font-weight="500" fill="#71798d">更新 stability / difficulty</text>
	</g>
	<path d="M318 298h56" stroke="#8a95ad" stroke-width="4" marker-end="url(#arrow)"/>
	<path d="M612 298h56" stroke="#8a95ad" stroke-width="4" marker-end="url(#arrow)"/>
	<path d="M906 298h56" stroke="#8a95ad" stroke-width="4" marker-end="url(#arrow)"/>
	<g transform="translate(166 462)" font-size="19" fill="#4f596e">
		<rect width="948" height="172" rx="28" fill="#ffffff" stroke="#cfd8e3" stroke-width="3" filter="url(#shadow)"/>
		<text x="34" y="46" font-size="24" font-weight="900" fill="#30364f">简化模型</text>
		<text x="34" y="88">retention(Δt, S) = exp(-Δt / S)</text>
		<text x="34" y="124">intervalDays = -S × ln(targetRetention)</text>
		<text x="490" y="88">第一次复习：1 天 / 3 天 / 7 天起步</text>
		<text x="490" y="124">后续复习：根据反馈动态调整稳定度与难度</text>
	</g>
</svg>
